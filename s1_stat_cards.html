<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: transparent; padding: 1rem; height: fit-content; overflow: hidden; }
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.card {
  background: #E8F3FC;
  border-radius: 8px;
  padding: 1.25rem 1rem;
  border-top: 3px solid #0B71BA;
}
.stat-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
  color: #0B71BA; margin-bottom: 6px;
}
.stat-value {
  font-size: 28px; font-weight: bold;
  color: #223971; line-height: 1.1; margin-bottom: 4px;
}
.stat-sub {
  font-size: 12px; color: #444; line-height: 1.5;
}
</style>
</head>
<body>

<div class="grid">
  <div class="card">
    <p class="stat-label">Total budget</p>
    <p class="stat-value">$XXB</p>
    <p class="stat-sub">Proposed for FY27</p>
  </div>

  <div class="card">
    <p class="stat-label">City population</p>
    <p class="stat-value">~500K</p>
    <p class="stat-sub">Residents served</p>
  </div>

  <div class="card">
    <p class="stat-label">City departments</p>
    <p class="stat-value">30+</p>
    <p class="stat-sub">Delivering city services</p>
  </div>

  <div class="card">
    <p class="stat-label">Strategic priorities</p>
    <p class="stat-value">5</p>
    <p class="stat-sub">Guiding pillars</p>
  </div>
</div>

</body>
</html>
</body>
</html>
